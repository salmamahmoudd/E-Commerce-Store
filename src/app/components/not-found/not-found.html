<div class="h-screen flex flex-col justify-center items-center bg-[var(--mauve-light)] text-center px-4">
  <h1 class="text-9xl font-extrabold text-[var(--peach-soft)] mb-6">404</h1>
  <h2 class="text-3xl font-bold mb-4 text-[var(--mauve-dark)]">Page Not Found</h2>
  <p class="text-[var(--taupe)] mb-6">Oops! The page you are looking for does not exist.</p>
  <button (click)="goHome()"
          class="px-6 py-3 bg-[var(--peach-soft)] text-white rounded-lg shadow-lg hover:bg-[var(--mauve-dark)] transition">
    Go to Home
  </button>
</div>
