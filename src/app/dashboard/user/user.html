<div class="p-6 bg-[var(--rose-gray)] min-h-screen">

  <h1 class="text-3xl font-bold text-[var(--mauve-dark)] mb-6">Admin Dashboard - Users</h1>

  <div class="overflow-x-auto">
    <table class="min-w-full bg-[var(--mauve-light)] shadow-lg rounded-lg overflow-hidden">
      <thead class="bg-[var(--peach-soft)] text-[var(--mauve-light)]">
        <tr>
          <th class="p-3 text-left">Name</th>
          <th class="p-3 text-left">Email</th>
          <th class="p-3 text-left">Role</th>
          <th class="p-3 text-left">Status</th>
          <th class="p-3 text-left">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users" class="border-b hover:bg-[var(--rose-gray)] transition">
          <td class="p-3 font-medium">{{ user.name }}</td>
          <td class="p-3 text-[var(--taupe)]">{{ user.email }}</td>
          <td class="p-3 capitalize">{{ user.role }}</td>
          <td class="p-3">
            <span [ngClass]="user.isBlocked ? 'text-red-600 font-bold' : 'text-green-600 font-bold'">
              {{ user.isBlocked ? 'Blocked' : 'Active' }}
            </span>
          </td>
          <td class="p-3 flex gap-2">
            <button (click)="toggleBlock(user)"
              [ngClass]="user.isBlocked ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'"
              class="text-white px-4 py-2 rounded-lg shadow-sm transition">
              {{ user.isBlocked ? 'Unblock' : 'Block' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
