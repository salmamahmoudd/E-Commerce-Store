<div class="p-6 bg-[var(--rose-gray)] min-h-screen">

  <h1 class="text-3xl font-bold text-[var(--mauve-dark)] mb-6 text-center">
    Products Dashboard
  </h1>

  <!-- Toasts -->
  <div class="fixed top-5 right-5 z-50 space-y-3">
    <div *ngFor="let toast of toasts"
         [ngClass]="{
           'bg-green-500': toast.type === 'success',
           'bg-red-500': toast.type === 'error'
         }"
         class="text-white px-5 py-3 rounded-lg shadow-lg font-semibold">
      {{ toast.message }}
    </div>
  </div>

  <!-- Form -->
  <div class="dashboard-card mb-8 p-4 bg-[var(--mauve-light)] rounded-xl shadow-md">
    <div class="flex flex-wrap gap-4">

      <input [(ngModel)]="newProduct.name"
             placeholder="Product Name"
             class="flex-1 px-4 py-3 rounded-lg border border-[var(--taupe)] focus:outline-none focus:ring-2 focus:ring-[var(--peach-soft)]"/>

      <input [(ngModel)]="newProduct.description"
             placeholder="Description"
             class="flex-1 px-4 py-3 rounded-lg border border-[var(--taupe)] focus:outline-none focus:ring-2 focus:ring-[var(--peach-soft)]"/>

      <input type="number" [(ngModel)]="newProduct.price"
             placeholder="Price"
             class="flex-1 px-4 py-3 rounded-lg border border-[var(--taupe)] focus:outline-none focus:ring-2 focus:ring-[var(--peach-soft)]"/>

      <input type="number" [(ngModel)]="newProduct.stock"
             placeholder="Stock"
             class="flex-1 px-4 py-3 rounded-lg border border-[var(--taupe)] focus:outline-none focus:ring-2 focus:ring-[var(--peach-soft)]"/>

      <select [(ngModel)]="newProduct.category" (change)="onCategoryChange()"
              class="flex-1 px-4 py-3 rounded-lg border border-[var(--taupe)] focus:outline-none focus:ring-2 focus:ring-[var(--peach-soft)]">
        <option value="">Select Category</option>
        <option *ngFor="let cat of categories" [value]="cat._id">{{ cat.name }}</option>
      </select>

      <select [(ngModel)]="newProduct.subcategory"
              class="flex-1 px-4 py-3 rounded-lg border border-[var(--taupe)] focus:outline-none focus:ring-2 focus:ring-[var(--peach-soft)]">
        <option value="">Select Subcategory</option>
        <option *ngFor="let sub of subCategories" [value]="sub._id">{{ sub.name }}</option>
      </select>

      <input type="file" (change)="onFileSelected($event)"
             class="flex-1 px-4 py-3 rounded-lg border border-[var(--taupe)]"/>

      <input [(ngModel)]="searchTerm" placeholder="Search products..."
             class="flex-1 px-4 py-3 rounded-lg border border-[var(--taupe)] focus:outline-none focus:ring-2 focus:ring-[var(--peach-soft)]"/>

      <button (click)="saveProduct()" class="btn-primary bg-[var(--peach-soft)] hover:bg-[var(--mauve-dark)] text-white px-6 py-2 rounded-lg font-semibold transition">
        {{ editMode ? 'Update' : 'Add' }}
      </button>

    </div>
  </div>

  <!-- Products Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <div *ngFor="let product of paginatedProducts()"
         class="bg-[var(--mauve-light)] p-4 rounded-xl shadow-md flex flex-col hover:shadow-lg transition">

      <img *ngIf="product.image" [src]="product.image"
           class="h-40 object-contain mb-3 rounded-lg"/>

      <h3 class="text-lg font-semibold text-[var(--mauve-dark)]">{{ product.name }}</h3>
      <p class="text-sm text-[var(--taupe)]">{{ product.description }}</p>

      <p class="text-sm mt-2">
        Status:
        <span class="ml-2 px-3 py-1 rounded-full text-xs text-white"
              [ngClass]="product.isActive ? 'bg-green-500' : 'bg-red-500'">
          {{ product.isActive ? 'Active' : 'Inactive' }}
        </span>
      </p>

      <p *ngIf="product.isDeleted" class="text-red-500 text-xs mt-1">Deleted</p>
      <p class="text-sm mt-1 text-[var(--peach-soft)]">Price: ${{ product.price }}</p>
      <p class="text-sm text-[var(--taupe)]">Stock: {{ product.stock }}</p>

      <div class="mt-auto flex gap-2 pt-4 flex-wrap">
        <button (click)="editProduct(product)"
                class="bg-[var(--peach-soft)] hover:bg-[var(--mauve-dark)] text-white px-3 py-1 rounded-lg font-semibold transition flex-1">
          Edit
        </button>

        <button *ngIf="!product.isDeleted"
                [routerLink]="['/admin/product', product._id]"
                class="border border-[var(--peach-soft)] hover:bg-[var(--peach-soft)] hover:text-[var(--mauve-light)] text-[var(--peach-soft)] px-3 py-1 rounded-lg font-semibold transition flex-1">
          Details
        </button>

        <button *ngIf="!product.isDeleted"
                (click)="deleteProduct(product._id!)"
                class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg font-semibold transition flex-1">
          Delete
        </button>
      </div>

    </div>
  </div>

  <!-- Pagination -->
  <div class="flex justify-center mt-6 gap-2">
    <button *ngFor="let page of totalPagesArray()"
            (click)="currentPage = page"
            [class.font-bold]="currentPage === page"
            class="px-4 py-2 rounded-lg bg-[var(--rose-gray)] hover:bg-[var(--taupe)] transition">
      {{ page }}
    </button>
  </div>

</div>
